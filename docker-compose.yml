services:
  postgres-db:
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s 
      retries: 5
    image: postgres:latest
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network 

  api:
    build: .
    container_name: postgres-api
    restart: always
    env_file:
      - .env
    ports:
      - "5001:5001"
    depends_on:
      postgres-db: 
        condition: service_healthy
    command: npm run dev # or node src/index.js
    networks:
       - backend-network    # ← can talk to database
       - frontend-network   # ← exposed to outside

volumes:
  postgres_data:

networks:
  backend-network:         # ← define networks here
    driver: bridge
  frontend-network:
    driver: bridge
